@switch(state){

    @case('loading'){
        <app-alert alertState="loading" text="Cargando Vehículo..." ></app-alert>
    }

    @case('error'){
        <app-alert alertState="error" text="Error al Cargar los Vehículos" ></app-alert>
    }

    @case('success'){
        <app-vehicles-table [vehicles]="vehicles" ></app-vehicles-table>
    }

}
