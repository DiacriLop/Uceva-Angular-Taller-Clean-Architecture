@switch(state){

    @case('loading'){
        <app-alert alertState="loading" text="Cargando Conseccionario..." ></app-alert>
    }

    @case('error'){
        <app-alert alertState="error" text="Error al Cargar los Conseccionarios" ></app-alert>
    }

    @case('success'){
        <app-dealerships-table [dealerships]="dealerships" ></app-dealerships-table>
    }

}
